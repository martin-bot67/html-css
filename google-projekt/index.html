<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Google</title>
</head>
    <link rel="stylesheet" href="css/style.css">
<body>
     <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      padding: 15px 20px;
      font-size: 14px;
    }

    .top-bar a {
      margin-left: 20px;
      text-decoration: none;
      color: #000000;
    }

    .top-bar a:hover {
      text-decoration: underline;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding-top: 20px;
    }

    .logo {
      font-size: 67px;
      font-weight: bold;
      margin-bottom: 20px;
      letter-spacing: -2px;
    }

    .logo span:nth-child(1) { color: #ff0000; }
    .logo span:nth-child(2) { color: #00ff4c; }
    .logo span:nth-child(3) { color: #2bff00; }
    .logo span:nth-child(4) { color: #001aff; }
    .logo span:nth-child(5) { color: #ff0000; }
    .logo span:nth-child(6) { color: #000000; }

    .search-box {
      width: 67%;
      max-width: 670px;
      display: flex;
      border: 1px solid #ddd;
      border-radius: 67px;
      padding: 10px 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .search-box input {
      border: none;
      outline: none;
      flex: 1;
      font-size: 36px;
    }

    .buttons {
      margin-top: 20px;
    }

    .buttons button {
      margin: 5px;
      padding: 10px 20px;
      border: none;
      background: #f8f9fa;
      border-radius: 5px;
      cursor: pointer;
    }

    .buttons button:hover {
      border: 1px solid #ccc;
    }

    .footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      background: #f2f2f2;
    }

    @media (max-width: 600px) {
      .logo {
        font-size: 50px;
      }
      .search-box {
        width: 90%;
      }
      .search-box input {
        font-size: 24px;
      }
      .buttons button {
        padding: 8px 16px;
        font-size: 14px;
      }
      .main {
        padding-top: 10px;
      }
      .top-bar {
        padding: 10px 15px;
        font-size: 12px;
      }
      .buttons {
        flex-direction: column;
        align-items: center;
      }
      .buttons button {
        width: 80%;
        max-width: 250px;
      }
    }
  </style>

  
  <div class="top-bar">
    <a href="#">Meilid</a>
    <a href="#">Pildid</a>
  </div>

  
  <div class="main">
    <img src="img/img/2.png" alt="Kaneel Logo" style="max-width: 100%; height: auto; margin-bottom: 20px;">
    <div class="logo">
      <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </div>
     <!-- Kuidas googliga siduda -->
    <form class="search-box" action="https://www.google.com/search" method="get">
      <input type="text" name="q" placeholder="Search...">
    </form>

    <div class="buttons">
      <button>Google otsing</button>
      <button>Proovi õnne (5.50€)</button>
    </div>
  </div>

  
  <div class="footer">
    Google OÜ 2026 | <a href="#">Privaatsus</a> | <a href="#">Tingimused</a>
</body>
</html>
